<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 情侣打卡</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="sun"></div>

    <div class="clouds">
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
    </div>

    <div class="seabirds">🐦</div>

    <div class="waves">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="couple-scene">
        <svg viewBox="0 0 180 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="sand" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#FFE4B5;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#DEB887;stop-opacity:1" />
                </linearGradient>
            </defs>
            <ellipse cx="90" cy="105" rx="85" ry="15" fill="url(#sand)" />
            <ellipse cx="90" cy="100" rx="70" ry="10" fill="#F4D03F" opacity="0.3" />
            <path d="M85,95 Q75,80 80,65 Q85,55 95,60 Q105,55 110,65 Q115,80 105,95" fill="#FFB6C1" stroke="#FF69B4" stroke-width="2"/>
            <circle cx="90" cy="50" r="12" fill="#FFE4C4" />
            <ellipse cx="87" cy="48" rx="2" ry="2.5" fill="#333"/>
            <ellipse cx="93" cy="48" rx="2" ry="2.5" fill="#333"/>
            <path d="M87,54 Q90,57 93,54" stroke="#FF69B4" stroke-width="1.5" fill="none"/>
            <path d="M82,42 Q85,38 88,42" stroke="#8B4513" stroke-width="3" fill="none"/>
            <path d="M92,42 Q95,38 98,42" stroke="#8B4513" stroke-width="3" fill="none"/>
            <ellipse cx="78" cy="70" rx="5" ry="8" fill="#FFB6C1"/>
            <ellipse cx="102" cy="70" rx="5" ry="8" fill="#FFB6C1"/>
            <path d="M60,100 Q50,85 55,70 Q60,60 70,65 Q75,70 70,85 Q68,95 60,100" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
            <circle cx="62" cy="58" r="10" fill="#FFE4C4" />
            <ellipse cx="59" cy="56" rx="1.5" ry="2" fill="#333"/>
            <ellipse cx="65" cy="56" rx="1.5" ry="2" fill="#333"/>
            <path d="M60,62 Q62,64 64,62" stroke="#FF69B4" stroke-width="1" fill="none"/>
            <path d="M55,50 Q58,46 61,50" stroke="#2F2F2F" stroke-width="2.5" fill="none"/>
            <path d="M63,50 Q66,46 69,50" stroke="#2F2F2F" stroke-width="2.5" fill="none"/>
            <path d="M45,105 L50,85 L55,105" stroke="#DEB887" stroke-width="3" fill="none"/>
            <path d="M115,105 L120,85 L125,105" stroke="#DEB887" stroke-width="3" fill="none"/>
            <ellipse cx="90" cy="92" rx="15" ry="4" fill="#FFD700" opacity="0.4"/>
        </svg>
    </div>

    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>💕 我们的时光</h1>
                <p class="subtitle">记录我们一起的美好</p>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="places">📍 去过的地方</button>
            <button class="tab-btn" data-tab="things">💞 一起做的事</button>
            <button class="tab-btn" data-tab="summary">✨ 我们的成就</button>
        </div>

        <div class="tab-content active" id="places">
            <div class="add-section">
                <div class="search-row">
                    <input type="text" id="place-input" placeholder="输入城市名称，如：北京、上海、东京..." />
                    <button class="search-btn" id="search-btn" onclick="searchPlace()">🔍 搜索</button>
                </div>
                <div class="search-result" id="search-result" style="display: none;"></div>
            </div>
            <div class="map-container" id="map-container">
                <div id="map"></div>
            </div>
            <div class="places-showcase" id="places-showcase"></div>
        </div>

        <div class="tab-content" id="things">
            <div class="things-grid" id="things-grid"></div>
        </div>

        <div class="tab-content" id="summary">
            <div class="summary-stats" id="summary-stats"></div>
            <div class="summary-content">
                <div class="summary-section">
                    <h3>📍 已打卡的地方</h3>
                    <div id="summary-places"></div>
                </div>
                <div class="summary-section">
                    <h3>💞 已完成的事情</h3>
                    <div id="summary-things"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
